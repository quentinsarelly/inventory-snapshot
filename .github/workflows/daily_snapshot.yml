name: Daily Inventory Snapshot

on:
  schedule:
    - cron: "0 11 * * *"  # 6am ET (UTC-5) / 7am EDT (UTC-4) — adjust seasonally
  workflow_dispatch:       # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all connectors
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SHOPIFY_API_VERSION:       ${{ secrets.SHOPIFY_API_VERSION }}
          SHOPIFY_CLIENT_ID:         ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET:     ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          SHOPIFY_US_SHOP_DOMAIN:    ${{ secrets.SHOPIFY_US_SHOP_DOMAIN }}
          SHOPIFY_MX_SHOP_DOMAIN:    ${{ secrets.SHOPIFY_MX_SHOP_DOMAIN }}
          SHOPIFY_US_ACCESS_TOKEN:   ${{ secrets.SHOPIFY_US_ACCESS_TOKEN }}
          SHOPIFY_MX_ACCESS_TOKEN:   ${{ secrets.SHOPIFY_MX_ACCESS_TOKEN }}
          AMAZON_LWA_APP_ID:         ${{ secrets.AMAZON_LWA_APP_ID }}
          AMAZON_LWA_CLIENT_SECRET:  ${{ secrets.AMAZON_LWA_CLIENT_SECRET }}
          AMAZON_REFRESH_TOKEN_US:   ${{ secrets.AMAZON_REFRESH_TOKEN_US }}
          AMAZON_REFRESH_TOKEN_MX:   ${{ secrets.AMAZON_REFRESH_TOKEN_MX }}
          AMAZON_AWS_ACCESS_KEY:     ${{ secrets.AMAZON_AWS_ACCESS_KEY }}
          AMAZON_AWS_SECRET_KEY:     ${{ secrets.AMAZON_AWS_SECRET_KEY }}
          AMAZON_ROLE_ARN:           ${{ secrets.AMAZON_ROLE_ARN }}
          TIKTOK_APP_KEY:            ${{ secrets.TIKTOK_APP_KEY }}
          TIKTOK_APP_SECRET:         ${{ secrets.TIKTOK_APP_SECRET }}
          TIKTOK_ACCESS_TOKEN:       ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN:      ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_SHOP_ID:            ${{ secrets.TIKTOK_SHOP_ID }}
          TIKTOK_SHOP_CYPHER:        ${{ secrets.TIKTOK_SHOP_CYPHER }}
          SHIPHERO_REFRESH_TOKEN:    ${{ secrets.SHIPHERO_REFRESH_TOKEN }}
          US_3PL_BASE_URL:           ${{ secrets.US_3PL_BASE_URL }}
          US_3PL_API_KEY:            ${{ secrets.US_3PL_API_KEY }}
        run: python run_all.py
